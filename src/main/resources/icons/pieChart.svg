<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
    <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <!-- Pie chart circle -->
        <circle cx="8" cy="8" r="5.5" fill="none" stroke="#6C9EF8" stroke-width="1"/>
        <!-- Pie slices (lines from center) -->
        <line x1="8" y1="8" x2="8" y2="2.5" stroke="#6C9EF8"/>
        <line x1="8" y1="8" x2="13.5" y2="8" stroke="#6C9EF8"/>
        <line x1="8" y1="8" x2="5" y2="12.5" stroke="#6C9EF8"/>
        <!-- Fill segments with different opacities -->
        <path d="M 8 8 L 8 2.5 A 5.5 5.5 0 0 1 13.5 8 Z" fill="#6C9EF8" fill-opacity="0.7" stroke="none"/>
        <path d="M 8 8 L 13.5 8 A 5.5 5.5 0 0 1 5 12.5 Z" fill="#6C9EF8" fill-opacity="0.4" stroke="none"/>
        <path d="M 8 8 L 5 12.5 A 5.5 5.5 0 0 1 8 2.5 Z" fill="#6C9EF8" fill-opacity="0.2" stroke="none"/>
    </g>
</svg>

